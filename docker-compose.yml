# used Local MySQL since it didn't work via Docker

version: '3.8'

services:
  mysql-performance-test:
    image: mysql:8.0
    container_name: sbb-performance-test-db
    environment:
      MYSQL_ROOT_PASSWORD: test1234
      MYSQL_DATABASE: sbb_performance
      MYSQL_USER: sbb_test
      MYSQL_PASSWORD: sbb_test1234
    ports:
      - "3307:3306"  # 기존 MySQL과 충돌 방지를 위해 3307 포트 사용
    volumes:
      - mysql-performance-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sbb-network

  # ── 관찰 가능성 스택 (k6 부하 테스트용) ──────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: sbb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-remote-write-receiver'  # k6 → Prometheus 직접 push 허용
    networks:
      - sbb-network

  grafana:
    image: grafana/grafana:latest
    container_name: sbb-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sbb-network

  # Spring Boot Application (uncomment to run with docker-compose)
  # sbb-app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: sbb-app
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     SPRING_PROFILES_ACTIVE: loadtest
  #     SPRING_DATASOURCE_URL: jdbc:mysql://mysql-performance-test:3306/sbb_performance?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
  #     SPRING_DATASOURCE_USERNAME: sbb_test
  #     SPRING_DATASOURCE_PASSWORD: sbb_test1234
  #   depends_on:
  #     mysql-performance-test:
  #       condition: service_healthy
  #   networks:
  #     - sbb-network

networks:
  sbb-network:
    driver: bridge

volumes:
  mysql-performance-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
