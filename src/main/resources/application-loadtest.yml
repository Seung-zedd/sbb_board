spring:
  config:
    activate:
      on-profile: loadtest
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sbb_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
    username: sbbtest
    password: test1234
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update  # 기존 데이터 유지 + 신규 테이블(TRENDING_QUESTION 등) 자동 생성
      naming:
        physical-strategy: com.mysite.sbb.configuration.CamelCaseToSnakeAndUpperCaseStrategy
    properties:
      hibernate:
        format_sql: false
    show-sql: false

# Actuator - Prometheus 메트릭 노출
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: sbb
    distribution:
      percentiles-histogram:
        http.server.requests: true  # P95/P99 히스토그램 활성화
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

logging:
  level:
    com.mysite.sbb: INFO
    org.hibernate.SQL: WARN
