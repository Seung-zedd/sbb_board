spring:
  config:
    activate:
      on-profile: performance
  # DataSource - Local MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sbb_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
    username: sbbtest
    password: test1234
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  # JPA
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create  # Phase 3 loadtest: 데이터 생성 후 loadtest 프로파일에서 재사용
      naming:
        physical-strategy: com.mysite.sbb.configuration.CamelCaseToSnakeAndUpperCaseStrategy
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 500  # Match the largest batch in DummyDataGenerator
          order_inserts: true  # Group inserts by entity
          order_updates: true  # Group updates by entity
    show-sql: false  # P6Spy로 로깅하므로 false

# Logging
logging:
  level:
    org.hibernate.SQL: INFO # Change from DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: INFO  # Change from TRACE
    com.mysite.sbb: DEBUG
